{% extends 'base.html' %}

{% block content %}
  <main class="container">
    <div class="row">
      <div class="col-md-6 offset-md-3 mt-5">
        <form method="POST" class="card card-body">
          <h1>{% if object %}Editar empleado{% else %}Nuevo empleado{% endif %}</h1>

          {% csrf_token %}

          {{ form.as_p }}

          <button class="btn btn-primary">
            Guardar
          </button>
        </form>
      </div>
    </div>
  </main>
{% endblock %}
